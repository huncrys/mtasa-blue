stages:
  - prepare
  - build
  - package
  - upload
  - release

variables:
  FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR: "true"
  PACKAGE_REGISTRY_URL: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/mtasa-blue
  OUTPUT_DIR: Bin/server
  BUILD_OVERRIDES: Shared/build_overrides.h
  NUM_CORES: 16

include:
  - local: .steps.gitlab-ci.yml
    inputs:
      platform: x86
  - local: .steps.gitlab-ci.yml
    inputs:
      platform: x64
#  - local: .steps.gitlab-ci.yml
#    inputs:
#      platform: arm
#  - local: .steps.gitlab-ci.yml
#    inputs:
#      platform: arm64

release:
  stage: release
  image: ${CI_REGISTRY}/oaklab/ci-tools:stable
  dependencies:
    - upload [x86]
    - upload [x64]
#    - upload [arm]
#    - upload [arm64]
  variables:
    GIT_STRATEGY: none
  script:
    - ASSETS="[$(cat assets/* | sed '/^$/d' | tr '\n' ',' | sed 's/,$//')]"
    - >-
      release-cli create
      --name "release-${CI_PIPELINE_IID}"
      --tag-name "release-${CI_PIPELINE_IID}"
      --assets-link "${ASSETS}"
  tags:
    - platform:any
  rules:
    - if: $CI_COMMIT_BRANCH
